name: Auto Generate Content and Deploy

on:
  schedule:
    # 每天早上 8 点（UTC 时间 0:00）自动运行
    - cron: '0 0 * * *'
  # 允许手动触发执行
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Content Generator
        # 这里会运行您的 AI 爬虫或生成脚本，根据 API 获取最新行业新闻并保存为 JSON
        run: npm run generate:seo
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Build Static Site
        # 执行 Next.js 的静态打包
        run: npm run build

      # 如果您绑定了 Cloudflare，此时打包后的 /out 文件夹会被 GitHub/CF 拉取并发布
      # 也可以在这里加上针对 GitHub Pages 或其他 VPS 的 rsync 部署步骤
